<!DOCTYPE html>

<head>
    <title>the Here Times</title>
    <meta name="viewport" content="initial-scale=1.0">
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css?family=Raleway" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="main.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <script src="https://www.gstatic.com/firebasejs/5.8.0/firebase.js"></script>
</head>

<body>
    <div id="main-body-container">
        <img id="theHereTimesLogo" src="app/assets/logo/theHereTimesHoriz.svg" alt="">
        <input id="pac-input" class="controls" type="text" placeholder="Search Box">
        <div id="map"></div>
        <div id="settings-container-desktop">
            <div id="settings-container-fields">

                <div id="language-label">
                    <p class="setting-input">Language</p>
                    <p id="language-input-auto"></p>
                </div>
                <div>
                    <input type="radio" name="language" value="auto">
                    <label for="auto">Auto</label>
                </div>
                <div>
                    <input type="radio" name="language" value="en">
                    <label for="english">English</label>
                </div>
                <div>
                    <input type="radio" name="language" value="it">
                    <label for="italian">Italian</label>
                </div>
                <div>
                    <input type="radio" name="language" value="de">
                    <label for="german">German</label>
                </div>
                <div>
                    <input type="radio" name="language" value="es">
                    <label for="spanish">Spanish</label>
                </div>
                <div>
                    <input type="radio" name="language" value="fr">
                    <label for="french">French</label>
                </div>
                
                <div id="days-since-published">
                    <p class="setting-input">Days Since Published</p>
                    <p id="days-since-published-input"></p>
                </div>
                <input type="range" name="days-since-published" min="1" max="30">
                
                <div id="sort-by">
                    <p class="setting-input">Sort By</p>
                    <select name="sort-by">
                        <option value="relevancy" selected>Relevancy</option>
                        <option value="date-published">Date Published</option>
                        <option value="popularity">Popularity</option>
                        <option value="Social Shares" disabled="disabled">Social Shares (Coming Soon)</option>
                    </select>
                </div>
            </div>
        </div>
        <!-- <button id="sign-up-log-in-button">sign-up / login</button>
        <div id="sign-up-log-in-container"></div> -->
    </div>

    <div id="rightSide"></div>
    <div id="bottomSide"></div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCo1UVUXi83YUE3yc8Xyrzml9Bfg-s1FpI&libraries=places"></script>
    <script src="libs.js"></script>
    <script src="main.js"></script>
</body>

</html>
